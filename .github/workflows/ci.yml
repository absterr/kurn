name: CI

on:
    push:
        branches:
            - main
        paths:
            - 'apps/**'
            - '**/package*.json'
            - 'bun.lock'
            - '.github/workflows/ci.yml'

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.3
                  cache: true

            - run: bun install --frozen-lockfile
            - run: bun lint
